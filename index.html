const renderScenario = (s) => {
  if(s.type==="sms") return React.createElement(SmsUI,{data:s});
  if(s.type==="whatsapp") return React.createElement(WhatsappUI,{data:s});
  if(s.type==="instagram") return React.createElement(InstagramUI,{data:s});
  if(s.type==="popup") return React.createElement(PopupUI,{data:s});
  return React.createElement(EmailUI,{data:s});
};

function App() {
  const [screen, setScreen] = useState("intro");
  const [currentQ, setCurrentQ] = useState(0);
  const [score, setScore] = useState(0);
  const [lastChoice, setLastChoice] = useState(null);
  const [gameOverData, setGameOverData] = useState(null);
  const [shownHard, setShownHard] = useState(false);

  const scenario = scenarios[currentQ];
  const maxScore = scenarios.length * 10;

  const handleChoice = (key) => {
    const choice = scenario.choices[key];
    if(!choice) return;
    if(choice.points === "GAMEOVER") { setGameOverData({...choice}); setScreen("gameover"); }
    else { setScore(s => s + choice.points); setLastChoice({...choice, key}); setScreen("feedback"); }
  };

  const next = () => {
    const n = currentQ + 1;
    if(n >= scenarios.length) { setScreen("results"); return; }
    if(n === 15 && !shownHard) { setShownHard(true); setCurrentQ(n); setScreen("hard_warning"); }
    else { setCurrentQ(n); setScreen("game"); }
  };

  const restart = () => { setScreen("intro"); setCurrentQ(0); setScore(0); setLastChoice(null); setGameOverData(null); setShownHard(false); };

  const B = {minHeight:"100vh",background:"linear-gradient(135deg,#0a0a1a 0%,#0d1b2a 50%,#0a1628 100%)",fontFamily:"'Courier New',Consolas,monospace",color:"#e8f4fd",padding:"0"};
  const C = {background:"rgba(255,255,255,0.04)",border:"1px solid rgba(100,180,255,0.15)",borderRadius:"14px",padding:"20px",backdropFilter:"blur(10px)"};
  const btn = (bg,extra={}) => ({border:"none",padding:"13px 22px",borderRadius:"8px",fontSize:"14px",fontFamily:"'Courier New',monospace",fontWeight:"bold",cursor:"pointer",letterSpacing:"0.5px",background:bg,color:"white",...extra});

  if(screen==="intro") return (
    <div style={{...B,display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}}>
      <div style={{maxWidth:"500px",width:"100%",textAlign:"center"}}>
        <div style={{fontSize:"56px",marginBottom:"10px"}}>🛡️</div>
        <div style={{fontSize:"10px",letterSpacing:"4px",color:"#64b4ff",marginBottom:"8px"}}>MISSIONE DI SICUREZZA DIGITALE</div>
        <h1 style={{fontSize:"26px",margin:"0 0 18px",color:"#fff",fontWeight:"900",lineHeight:"1.2"}}>CYBER DETECTIVE</h1>
        <div style={{...C,textAlign:"left",marginBottom:"22px"}}>
          <p style={{margin:"0 0 10px",lineHeight:"1.7",color:"#64b4ff",fontWeight:"bold",fontSize:"14px"}}>Benvenuto Agente Digitale.</p>
          <p style={{margin:"0 0 10px",lineHeight:"1.7",color:"#b0d4f0",fontSize:"13px"}}>Ogni giorno hacker e truffatori cercano di convincere le persone a cliccare link, condividere password o effettuare pagamenti falsi.</p>
          <p style={{margin:"0 0 10px",lineHeight:"1.7",color:"#b0d4f0",fontSize:"13px"}}>In questo gioco dovrai prendere decisioni rapide davanti a email, SMS, messaggi social e notifiche realistiche.</p>
          <p style={{margin:"0",lineHeight:"1.7",color:"#ffd700",fontSize:"13px",fontWeight:"bold"}}>⚠️ Non tutte le scelte sbagliate sono fatali… ma alcune lo sono.</p>
        </div>
        <div style={{display:"flex",gap:"8px",justifyContent:"center",marginBottom:"20px",flexWrap:"wrap"}}>
          {[["🎯","20 scenari"],["⚡","Feedback immediato"],["💀","Game Over reali"]].map(([icon,title])=>(
            <div key={title} style={{...C,padding:"12px 16px",textAlign:"center",flex:"1",minWidth:"110px"}}>
              <div style={{fontSize:"20px"}}>{icon}</div>
              <div style={{fontSize:"11px",fontWeight:"bold",color:"#64b4ff",marginTop:"4px"}}>{title}</div>
            </div>
          ))}
        </div>
        <button style={btn("#00c896",{fontSize:"15px",padding:"15px 36px"})} onClick={()=>setScreen("game")}>▶ INIZIA LA MISSIONE</button>
      </div>
    </div>
  );

  if(screen==="hard_warning") return (
    <div style={{...B,display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}}>
      <div style={{maxWidth:"460px",width:"100%",textAlign:"center"}}>
        <div style={{fontSize:"56px",marginBottom:"10px"}}>⚠️</div>
        <h2 style={{color:"#ff6b35",fontSize:"24px",margin:"0 0 18px",letterSpacing:"2px"}}>LIVELLO DIFFICILE</h2>
        <div style={{...C,background:"rgba(255,107,53,0.1)",border:"1px solid rgba(255,107,53,0.3)",marginBottom:"22px",textAlign:"left"}}>
          <p style={{margin:"0 0 10px",color:"#ffb347",fontSize:"14px",fontWeight:"bold"}}>Le prossime 5 situazioni sono MOLTO DIFFICILI.</p>
          <p style={{margin:"0",color:"#b0d4f0",fontSize:"13px",lineHeight:"1.6"}}>Anche esperti di sicurezza informatica commettono errori in questi scenari. Truffatori sofisticati usano tecniche avanzate che imitano quasi perfettamente comunicazioni legittime. Trovali tutti e vinci la sfida!!!</p>
        </div>
        <div style={{fontSize:"38px",fontWeight:"900",color:"#ffd700",marginBottom:"4px"}}>{score} / {maxScore}</div>
        <div style={{color:"#8ab4cc",fontSize:"13px",marginBottom:"22px"}}>punteggio attuale</div>
        <button style={btn("#ff6b35")} onClick={()=>setScreen("game")}>AFFRONTA I LIVELLI DIFFICILI →</button>
      </div>
    </div>
  );

  if(screen==="game" && scenario) {
    const aLabel = {click:"🖱️  Clicca e accetta", report:"🚩  Segnala come truffa", delete:"🗑️  Elimina e blocca definitivamente"};
    const aColor = {click:"rgba(26,115,232,0.15)", report:"rgba(232,168,0,0.15)", delete:"rgba(95,99,104,0.15)"};
    const aBorder = {click:"rgba(26,115,232,0.4)", report:"rgba(232,168,0,0.4)", delete:"rgba(95,99,104,0.4)"};
    const aText = {click:"#7ab3ff", report:"#ffd700", delete:"#adb5bd"};
    return (
      <div style={{...B,padding:"12px"}}>
        <div style={{maxWidth:"600px",margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
            <div style={{fontSize:"10px",color:"#64b4ff",letterSpacing:"2px"}}>SCENARIO {currentQ+1} / {scenarios.length}</div>
            <div style={{background:"rgba(100,180,255,0.1)",border:"1px solid rgba(100,180,255,0.3)",borderRadius:"20px",padding:"5px 12px",fontSize:"13px",fontWeight:"bold",color:"#ffd700"}}>⭐ {score} pt</div>
          </div>
          <div style={{height:"4px",background:"rgba(255,255,255,0.1)",borderRadius:"2px",marginBottom:"14px"}}>
            <div style={{height:"100%",background:"linear-gradient(90deg,#64b4ff,#00c896)",borderRadius:"2px",width:`${((currentQ+1)/scenarios.length)*100}%`,transition:"width 0.3s"}}/>
          </div>
          {scenario.difficulty==="hard" && <div style={{textAlign:"center",marginBottom:"8px"}}><span style={{background:"rgba(255,107,53,0.2)",border:"1px solid rgba(255,107,53,0.4)",color:"#ff6b35",fontSize:"10px",padding:"3px 10px",borderRadius:"20px",letterSpacing:"2px"}}>🔥 LIVELLO DIFFICILE</span></div>}
          <h2 style={{textAlign:"center",margin:"0 0 12px",color:"#fff",fontSize:"15px",fontWeight:"700"}}>{scenario.title}</h2>
          <div style={{marginBottom:"18px"}}>{renderScenario(scenario)}</div>
          <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
            {["click","report","delete"].map(key=>(
              <button key={key} style={{border:`1px solid ${aBorder[key]}`,padding:"12px 16px",borderRadius:"8px",fontSize:"13px",fontFamily:"'Courier New',monospace",fontWeight:"bold",cursor:"pointer",background:aColor[key],color:aText[key],display:"flex",alignItems:"center",gap:"8px",textAlign:"left",width:"100%"}} onClick={()=>handleChoice(key)}>
                {aLabel[key]}
              </button>
            ))}
          </div>
        </div>
      </div>
    );
  }

  if(screen==="feedback" && lastChoice) {
    const ip = lastChoice.points===10, ig = lastChoice.points===5;
    const col = ip?"#00c896":ig?"#ffd700":"#ff6b35";
    const ico = ip?"✅":ig?"⚠️":"❌";
    return (
      <div style={{...B,display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}}>
        <div style={{maxWidth:"500px",width:"100%"}}>
          <div style={{textAlign:"center",marginBottom:"18px"}}>
            <div style={{fontSize:"48px"}}>{ico}</div>
            <div style={{fontSize:"34px",fontWeight:"900",color:col,margin:"6px 0"}}>+{lastChoice.points} punti</div>
            <div style={{color:"#8ab4cc",fontSize:"13px"}}>Totale: {score} / {maxScore}</div>
          </div>
          <div style={{...C,marginBottom:"14px",border:`1px solid rgba(${ip?"0,200,150":ig?"255,215,0":"255,107,53"},0.3)`}}>
            <div style={{fontSize:"11px",color:col,fontWeight:"bold",marginBottom:"8px",letterSpacing:"1px"}}>💡 SPIEGAZIONE</div>
            <p style={{margin:"0 0 12px",color:"#b0d4f0",fontSize:"13px",lineHeight:"1.7"}}>{lastChoice.explanation}</p>
            <div style={{borderTop:"1px solid rgba(255,255,255,0.1)",paddingTop:"10px",color:"#8ab4cc",fontSize:"12px",fontStyle:"italic"}}>🎭 {lastChoice.irony}</div>
          </div>
          <button style={btn("#00c896",{width:"100%",textAlign:"center"})} onClick={next}>
            {currentQ+1>=scenarios.length?"VEDI RISULTATI FINALI →":"PROSSIMO SCENARIO →"}
          </button>
        </div>
      </div>
    );
  }

  if(screen==="gameover" && gameOverData) return (
    <div style={{...B,display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}}>
      <div style={{maxWidth:"460px",width:"100%",textAlign:"center"}}>
        <div style={{fontSize:"68px",marginBottom:"6px"}}>💀</div>
        <h2 style={{color:"#ff4444",fontSize:"38px",margin:"0 0 4px",letterSpacing:"4px",fontWeight:"900"}}>GAME OVER</h2>
        <div style={{color:"#ff6b6b",fontSize:"11px",letterSpacing:"2px",marginBottom:"22px"}}>LA MISSIONE È FALLITA</div>
        <div style={{...C,background:"rgba(255,68,68,0.08)",border:"1px solid rgba(255,68,68,0.25)",marginBottom:"16px",textAlign:"left"}}>
          <div style={{fontSize:"11px",color:"#ff6b6b",fontWeight:"bold",marginBottom:"8px",letterSpacing:"1px"}}>🎭 COSA È SUCCESSO</div>
          <p style={{margin:"0 0 12px",color:"#ffaaaa",fontSize:"13px",fontStyle:"italic",lineHeight:"1.6"}}>"{gameOverData.irony}"</p>
          <div style={{borderTop:"1px solid rgba(255,68,68,0.2)",paddingTop:"10px"}}>
            <div style={{fontSize:"11px",color:"#ff6b6b",fontWeight:"bold",marginBottom:"6px",letterSpacing:"1px"}}>📚 LEZIONE IMPARATA</div>
            <p style={{margin:"0",color:"#b0d4f0",fontSize:"13px",lineHeight:"1.7"}}>{gameOverData.explanation}</p>
          </div>
        </div>
        <div style={{marginBottom:"6px",color:"#8ab4cc",fontSize:"13px"}}>Punteggio prima del game over: <strong style={{color:"#ffd700"}}>{score}</strong></div>
        <button style={btn("#ff4444",{marginTop:"14px"})} onClick={restart}>🔄 RIPROVA DALL'INIZIO</button>
      </div>
    </div>
  );

  if(screen==="results") {
    const pct = (score/maxScore)*100;
    let rank,rCol,rIcon,rDesc;
    if(score<=80){rank="Internet ti ha quasi sconfitto";rCol="#ff6b35";rIcon="😰";rDesc="Serve allenamento. Molte delle tecniche usate dai truffatori ti hanno ingannato. Riprova e ricorda: verifica sempre tutto quello che puoi, mai cliccare link sotto pressione.";}
    else if(score<=150){rank="Buona attenzione digitale";rCol="#ffd700";rIcon="👍";rDesc="Stai sviluppando buone abitudini di sicurezza. Hai riconosciuto molte truffe, ma alcune tecniche avanzate ti hanno ingannato. Continua ad allenarti per sopravvire nel tosto e difficile mondo digitale.";}
    else{rank="Complimenti! Sei il capo Anti-Phishing certificato";rCol="#00c896";rIcon="🏆";rDesc="Hai dimostrato una solida comprensione delle tecniche di phishinge hai completato la missione! Ricorda di applicare queste conoscenze ogni giorno online.";}
    return (
      <div style={{...B,display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}}>
        <div style={{maxWidth:"500px",width:"100%",textAlign:"center"}}>
          <div style={{fontSize:"60px",marginBottom:"8px"}}>{rIcon}</div>
          <div style={{fontSize:"10px",letterSpacing:"3px",color:"#64b4ff",marginBottom:"8px"}}>RISULTATO FINALE</div>
          <h2 style={{color:rCol,fontSize:"19px",margin:"0 0 18px",fontWeight:"900",lineHeight:"1.3"}}>{rank}</h2>
          <div style={{...C,marginBottom:"16px"}}>
            <div style={{fontSize:"52px",fontWeight:"900",color:rCol}}>{score}</div>
            <div style={{color:"#8ab4cc",fontSize:"13px",marginBottom:"12px"}}>su {maxScore} punti possibili</div>
            <div style={{height:"10px",background:"rgba(255,255,255,0.1)",borderRadius:"5px",overflow:"hidden"}}>
              <div style={{height:"100%",background:`linear-gradient(90deg,${rCol},${rCol}88)`,borderRadius:"5px",width:`${pct}%`}}/>
            </div>
            <div style={{color:"#64b4ff",fontSize:"12px",marginTop:"6px"}}>{Math.round(pct)}% delle risposte corrette</div>
          </div>
          <div style={{...C,textAlign:"left",marginBottom:"14px"}}><p style={{margin:"0",color:"#b0d4f0",fontSize:"13px",lineHeight:"1.7"}}>{rDesc}</p></div>
          <div style={{...C,textAlign:"left",marginBottom:"20px"}}>
            <div style={{fontSize:"10px",color:"#64b4ff",fontWeight:"bold",letterSpacing:"2px",marginBottom:"10px"}}>📋 REGOLE D'ORO</div>
            {["Controlla sempre il dominio del mittente, non il nome visualizzato","Le banche non chiedono mai credenziali complete via email","L'urgenza artificiale è sempre un segnale d'allarme","Non aprire allegati .zip non richiesti","Per conferme bancarie, usa sempre l'app ufficiale"].map((r,i)=>(
              <div key={i} style={{display:"flex",gap:"8px",marginBottom:"6px",fontSize:"12px",color:"#b0d4f0",lineHeight:"1.5"}}>
                <span style={{color:"#00c896",flexShrink:0}}>✓</span>{r}
              </div>
            ))}
          </div>
          <button style={btn("#00c896")} onClick={restart}>🔄 GIOCA ANCORA</button>
        </div>
      </div>
    );
  }
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
